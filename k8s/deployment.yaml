apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor-deployment
  labels:
    app: health-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-monitor
  template:
    metadata:
      labels:
        app: health-monitor
    spec:
      containers:
      - name: health-monitor
        image: YOUR_DOCKERHUB_USERNAME/health-monitor:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: health-monitor-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        # Mount /proc and /sys from the host for accurate metrics
        volumeMounts:
        - name: proc
          mountPath: /proc
        - name: sys
          mountPath: /sys
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys